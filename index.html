<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generador de Constancias — Universidad Siglo 21</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --s21-teal:    #032123;
  --s21-teal2:   #0a3a3c;
  --s21-burgundy:#5a1729;
  --s21-burg2:   #7a2035;
  --white:       #ffffff;
  --off-white:   #f5f3f0;
  --panel-bg:    #111315;
  --panel2:      #1a1d1f;
  --border:      #2a2e30;
  --text:        #e8e6e2;
  --muted:       #6a7275;
  --accent:      #5a1729;
}

body {
  background: var(--panel-bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  background: var(--s21-burgundy);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 3px solid var(--s21-teal);
}
.header-logo {
  height: 32px;
  filter: brightness(0) invert(1);
}
.header-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,.9);
}
.header-sub {
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,.5);
  letter-spacing: .06em;
  margin-left: 8px;
}

/* LAYOUT */
.app { display: flex; flex: 1; }

/* PANEL */
.panel {
  width: 320px;
  min-width: 280px;
  background: var(--panel2);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
  max-height: calc(100vh - 57px);
}
.sec-title {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

.field { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.field label {
  font-size:10.5px; font-weight:600;
  letter-spacing:.05em; text-transform:uppercase;
  color: var(--muted);
}
.field input, .field select, .field textarea {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 8px 11px;
  border-radius: 5px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--s21-burg2);
}
.field textarea { resize: vertical; min-height: 65px; line-height: 1.5; }

/* Templates */
.tpls { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.tpl {
  border: 1.5px solid var(--border);
  border-radius:5px; padding:10px 6px;
  cursor:pointer; transition:all .15s;
  text-align:center;
  font-size:10.5px; font-weight:700;
  color:var(--muted);
  letter-spacing:.05em; text-transform:uppercase;
  background:var(--panel-bg);
}
.tpl .icon { font-size:18px; display:block; margin-bottom:4px; }
.tpl:hover, .tpl.active {
  border-color:var(--s21-burg2);
  color:var(--white);
  background: rgba(90,23,41,.12);
}

/* Actions */
.btn {
  width:100%; padding:10px 14px;
  border:none; border-radius:5px;
  font-family:'DM Sans',sans-serif;
  font-size:12.5px; font-weight:700;
  letter-spacing:.07em; text-transform:uppercase;
  cursor:pointer; transition:all .15s;
  margin-bottom:8px;
}
.btn-primary { background:var(--s21-burgundy); color:#fff; }
.btn-primary:hover { background:var(--s21-burg2); }
.btn-secondary { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--muted); color:var(--text); }

/* PREVIEW */
.preview-area {
  flex:1;
  display:flex; align-items:center; justify-content:center;
  padding:36px;
  background: #0a0c0d;
  background-image: radial-gradient(circle at 50% 50%, #0f1618 0%, #060809 100%);
  overflow:auto;
}
#cert-wrapper { transform-origin: center center; }

/* ══ CERTIFICATE BASE ══ */
.constancia {
  width: 900px;
  height: 636px;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  box-shadow: 0 24px 64px rgba(0,0,0,.7);
}

/* ── TEMPLATE 1: INSTITUCIONAL ── */
.tpl-institucional {
  background: var(--white);
}
.tpl-institucional .c-header {
  background: var(--s21-teal);
  padding: 22px 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tpl-institucional .c-footer {
  background: var(--s21-burgundy);
  padding: 14px 44px;
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ── TEMPLATE 2: FORMAL ── */
.tpl-formal {
  background: #faf8f5;
}
.tpl-formal .c-left-bar {
  position:absolute; left:0; top:0; bottom:0; width:10px;
  background: var(--s21-teal);
}
.tpl-formal .c-top-accent {
  position:absolute; top:0; left:10px; right:0; height:5px;
  background: var(--s21-burgundy);
}

/* ── TEMPLATE 3: OSCURO ── */
.tpl-oscuro {
  background: var(--s21-teal);
}

/* ── TEMPLATE 4: MINIMALISTA ── */
.tpl-minimal {
  background: #f7f5f2;
  border-top: 8px solid var(--s21-teal);
  border-bottom: 8px solid var(--s21-burgundy);
}

/* CERT CONTENT */
.c-body {
  flex:1;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  padding: 0 72px;
  position: relative;
  z-index: 2;
}

.c-supertitle {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.c-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .28em;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.c-presents {
  font-size: 13px;
  font-weight: 400;
  margin-bottom: 8px;
}
.c-name {
  font-size: 44px;
  font-weight: 800;
  line-height: 1.05;
  margin-bottom: 16px;
  letter-spacing: -.01em;
}
.c-divider {
  width: 56px; height: 3px;
  margin: 0 auto 14px;
}
.c-body-text {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.6;
  margin-bottom: 10px;
}
.c-course {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: .02em;
  margin-bottom: 4px;
}
.c-hours {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 24px;
  opacity: .6;
}

/* SIGNATURE */
.c-sig-area {
  display:flex;
  justify-content:center;
  gap:80px;
  width:100%;
}
.c-sig {
  display:flex; flex-direction:column;
  align-items:center; gap:4px;
  min-width:160px;
}
.c-sig-line { width:140px; height:1px; }
.c-sig-name {
  font-size:12px; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase;
  margin-top:3px;
}

/* DATE */
.c-date-block {
  display:flex; flex-direction:column;
  align-items:center; gap:2px;
}
.c-date-label {
  font-size:9px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; opacity:.5;
}
.c-date-value { font-size:13px; font-weight:500; }

/* Logo in cert */
.c-cert-logo { height:30px; object-fit:contain; }
.c-cert-logo-sm { height:22px; object-fit:contain; }

@media (max-width:1280px) { #cert-wrapper { transform:scale(.75); } }
@media (max-width:1080px) { #cert-wrapper { transform:scale(.60); } }
@media (max-width:900px) {
  .app { flex-direction:column; }
  .panel { width:100%; max-height:none; border-right:none; border-bottom:1px solid var(--border); }
  #cert-wrapper { transform:scale(.42); }
  .preview-area { min-height:330px; }
}
</style>
</head>
<body>

<header>
  <img class="header-logo" id="header-logo-img" src="" alt="Siglo 21" />
  <div>
    <span class="header-title">Generador de Constancias</span>
    <span class="header-sub">Escuela de Posgrado · Universidad Siglo 21</span>
  </div>
</header>

<div class="app">
  <aside class="panel">

    <div>
      <div class="sec-title">Plantilla</div>
      <div class="tpls">
        <div class="tpl active" data-tpl="institucional" onclick="setTpl(this)">
          <span class="icon">🏛</span>Institucional
        </div>
        <div class="tpl" data-tpl="formal" onclick="setTpl(this)">
          <span class="icon">◼</span>Formal
        </div>
        <div class="tpl" data-tpl="oscuro" onclick="setTpl(this)">
          <span class="icon">✦</span>Oscuro
        </div>
        <div class="tpl" data-tpl="minimal" onclick="setTpl(this)">
          <span class="icon">—</span>Minimal
        </div>
      </div>
    </div>

    <div>
      <div class="sec-title">Institución</div>
      <div class="field">
        <label>Nombre de la institución</label>
        <input id="f-inst" type="text" value="Universidad Siglo 21" oninput="render()" />
      </div>
      <div class="field">
        <label>Unidad / Escuela</label>
        <input id="f-unit" type="text" value="Escuela de Posgrado" oninput="render()" />
      </div>
    </div>

    <div>
      <div class="sec-title">Participante</div>
      <div class="field">
        <label>Nombre completo</label>
        <input id="f-name" type="text" value="María Elena Rodríguez" oninput="render()" />
      </div>
    </div>

    <div>
      <div class="sec-title">Actividad</div>
      <div class="field">
        <label>Tipo de actividad</label>
        <input id="f-type" type="text" value="Conversatorio" oninput="render()" />
      </div>
      <div class="field">
        <label>Nombre del programa / evento</label>
        <input id="f-course" type="text" value="La era del riesgo geopolítico: Impacto en los mercados y negocios internacionales" oninput="render()" />
      </div>
      <div class="field">
        <label>Carga horaria (opcional)</label>
        <input id="f-hours" type="text" value="3 horas académicas" oninput="render()" />
      </div>
      <div class="field">
        <label>Texto de cuerpo</label>
        <textarea id="f-body" oninput="render()">participó en calidad de asistente en el</textarea>
      </div>
    </div>

    <div>
      <div class="sec-title">Firma y fecha</div>
      <div class="field">
        <label>Nombre de quien firma</label>
        <input id="f-sig1" type="text" value="Dr. Carlos Pérez" oninput="render()" />
      </div>
      <div class="field">
        <label>Fecha</label>
        <input id="f-date" type="date" oninput="render()" />
      </div>
    </div>

    <div>
      <button class="btn btn-primary" onclick="download()">⬇ Descargar PNG</button>
      <button class="btn btn-secondary" onclick="resetForm()">↺ Restablecer</button>
    </div>

  </aside>

  <main class="preview-area">
    <div id="cert-wrapper">
      <div id="cert" class="constancia tpl-institucional"></div>
    </div>
  </main>
</div>

let currentTpl = 'institucional';

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('header-logo-img').src = LOGO_B64;
  render();
});

function setTpl(el) {
  document.querySelectorAll('.tpl').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTpl = el.dataset.tpl;
  render();
}

function getData() {
  const dv = document.getElementById('f-date').value;
  let ds = '';
  if (dv) {
    const d = new Date(dv + 'T12:00:00');
    ds = d.toLocaleDateString('es-AR', { day:'numeric', month:'long', year:'numeric' });
  }
  return {
    inst:   document.getElementById('f-inst').value   || 'Universidad Siglo 21',
    unit:   document.getElementById('f-unit').value   || '',
    name:   document.getElementById('f-name').value   || 'Nombre del Participante',
    type:   document.getElementById('f-type').value   || '',
    course: document.getElementById('f-course').value || '',
    hours:  document.getElementById('f-hours').value  || '',
    body:   document.getElementById('f-body').value   || 'participó en',
    sig1:   document.getElementById('f-sig1').value   || '',
    date:   ds,
  };
}

function render() {
  const d = getData();
  const cert = document.getElementById('cert');
  cert.className = `constancia tpl-${currentTpl}`;
  cert.innerHTML = buildHTML(currentTpl, d);
}

// ── TEAL TONES ──
const T = '#032123', T2 = '#0a3a3c', BURG = '#5a1729', BURG2 = '#7a2035', WHITE = '#ffffff', OFF = '#f5f3f0';

function buildHTML(tpl, d) {
  if (tpl === 'institucional') return buildInstitucional(d);
  if (tpl === 'formal')        return buildFormal(d);
  if (tpl === 'oscuro')        return buildOscuro(d);
  if (tpl === 'minimal')       return buildMinimal(d);
  return buildInstitucional(d);
}

function buildInstitucional(d) {
  return `
    <div class="c-header">
      <img src="${LOGO_B64}" class="c-cert-logo" style="height:36px" alt="Siglo 21"/>
      <div style="text-align:right">
        <div style="font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5)">${d.unit}</div>
      </div>
    </div>

    <div class="c-body" style="background:${WHITE}">
      <div class="c-supertitle" style="color:${BURG}">${d.inst}</div>
      <div class="c-title" style="color:${T}">Constancia</div>
      <div class="c-presents" style="color:#444">Por medio de la presente, certifica que</div>
      <div class="c-name" style="color:${T}">${d.name}</div>
      <div class="c-divider" style="background:${BURG}"></div>
      <div class="c-body-text" style="color:#555">${d.body}</div>
      ${d.type ? `<div style="font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:${BURG};margin-bottom:4px">${d.type}</div>` : ''}
      <div class="c-course" style="color:${T}">${d.course}</div>
      ${d.hours ? `<div class="c-hours">${d.hours}</div>` : '<div style="height:20px"></div>'}
      <div class="c-sig-area">
        ${d.sig1 ? sigBlock(d.sig1, BURG, '#111') : ''}
        ${d.date ? dateBlock(d.date, '#333') : ''}
      </div>
    </div>

    <div class="c-footer">
      <div style="font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.55)">${d.inst} · ${d.unit}</div>
      <div style="font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.04em">www.21.edu.ar</div>
    </div>
  `;
}

function buildFormal(d) {
  return `
    <div class="c-left-bar"></div>
    <div class="c-top-accent"></div>

    <div class="c-body" style="padding-left:88px;align-items:flex-start;text-align:left">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
        <img src="${LOGO_B64}" style="height:28px;filter:none" alt="Siglo 21"/>
      </div>
      <div class="c-supertitle" style="color:${BURG};align-self:flex-start">${d.inst} · ${d.unit}</div>
      <div class="c-title" style="color:${T};align-self:flex-start;font-size:15px">Constancia de Participación</div>
      <div class="c-presents" style="color:#555;font-size:12px">Se certifica que</div>
      <div class="c-name" style="color:${T};font-size:42px;text-align:left">${d.name}</div>
      <div style="width:52px;height:4px;background:${BURG};margin:0 0 14px"></div>
      <div class="c-body-text" style="color:#555;text-align:left">${d.body}</div>
      ${d.type ? `<div style="font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:${BURG};margin-bottom:4px">${d.type}</div>` : ''}
      <div class="c-course" style="color:${T};text-align:left;font-size:18px">${d.course}</div>
      ${d.hours ? `<div class="c-hours" style="text-align:left">${d.hours}</div>` : '<div style="height:20px"></div>'}
      <div class="c-sig-area" style="justify-content:flex-start;gap:60px">
        ${d.sig1 ? sigBlock(d.sig1, BURG, '#111') : ''}
        ${d.date ? dateBlock(d.date, '#333') : ''}
      </div>
    </div>
  `;
}

function buildOscuro(d) {
  const glow = `radial-gradient(ellipse at 50% 40%, rgba(90,23,41,.18) 0%, transparent 65%)`;
  return `
    <div style="position:absolute;inset:0;background:${glow};pointer-events:none;z-index:1"></div>
    <div style="position:absolute;inset:18px;border:1px solid rgba(90,23,41,.4);pointer-events:none;z-index:1"></div>
    <div style="position:absolute;inset:24px;border:.5px solid rgba(255,255,255,.06);pointer-events:none;z-index:1"></div>

    <div class="c-body" style="z-index:2">
      <img src="${LOGO_B64}" style="height:30px;filter:brightness(0) invert(1);margin-bottom:18px" alt="Siglo 21"/>
      <div class="c-supertitle" style="color:${BURG2}">${d.unit}</div>
      <div style="width:180px;height:.5px;background:linear-gradient(90deg,transparent,${BURG2},transparent);margin:0 auto 18px"></div>
      <div class="c-presents" style="color:rgba(255,255,255,.45);font-size:12px">Certifica que</div>
      <div class="c-name" style="color:${WHITE};font-weight:800">${d.name}</div>
      <div style="width:180px;height:.5px;background:linear-gradient(90deg,transparent,${BURG2},transparent);margin:0 auto 16px"></div>
      <div class="c-title" style="color:rgba(255,255,255,.3);font-size:10px;margin-bottom:14px;letter-spacing:.24em">CONSTANCIA DE PARTICIPACIÓN</div>
      <div class="c-body-text" style="color:rgba(255,255,255,.55)">${d.body}</div>
      ${d.type ? `<div style="font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:${BURG2};margin-bottom:6px">${d.type}</div>` : ''}
      <div class="c-course" style="color:${WHITE};font-size:18px">${d.course}</div>
      ${d.hours ? `<div class="c-hours" style="color:rgba(255,255,255,.35)">${d.hours}</div>` : '<div style="height:20px"></div>'}
      <div class="c-sig-area">
        ${d.sig1 ? sigBlock(d.sig1, BURG2, WHITE) : ''}
        ${d.date ? dateBlock(d.date, WHITE) : ''}
      </div>
    </div>
  `;
}

function buildMinimal(d) {
  return `
    <div style="position:absolute;top:28px;left:44px;right:44px;display:flex;justify-content:space-between;align-items:center;z-index:2">
      <img src="${LOGO_B64}" style="height:24px;filter:none" alt="Siglo 21"/>
      <div style="font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:${BURG};opacity:.7">${d.unit}</div>
    </div>

    <div class="c-body" style="z-index:2;padding-top:60px">
      <div style="font-size:9.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#aaa;margin-bottom:28px">CONSTANCIA DE PARTICIPACIÓN</div>
      <div class="c-presents" style="color:#888;font-size:12px;margin-bottom:4px">Se certifica que</div>
      <div class="c-name" style="color:#111;font-size:50px;font-weight:800;letter-spacing:-.02em">${d.name}</div>
      <div style="width:44px;height:3px;background:${BURG};margin:12px auto 14px"></div>
      <div class="c-body-text" style="color:#666">${d.body}</div>
      ${d.type ? `<div style="font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:${T};margin-bottom:4px">${d.type}</div>` : ''}
      <div class="c-course" style="color:${BURG};font-size:18px;font-weight:700">${d.course}</div>
      ${d.hours ? `<div class="c-hours">${d.hours}</div>` : '<div style="height:20px"></div>'}
      <div class="c-sig-area">
        ${d.sig1 ? sigBlock(d.sig1, BURG, '#111') : ''}
        ${d.date ? dateBlock(d.date, '#333') : ''}
      </div>
    </div>

    <div style="position:absolute;bottom:24px;left:44px;right:44px;display:flex;justify-content:space-between;z-index:2">
      <div style="font-size:8px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#bbb">${d.inst}</div>
      <div style="font-size:8px;color:#ccc">www.21.edu.ar</div>
    </div>
  `;
}

function sigBlock(name, lineColor, textColor) {
  return `
    <div class="c-sig" style="color:${textColor}">
      <div class="c-sig-line" style="background:${rgba(lineColor,.5)}"></div>
      <div class="c-sig-name">${name}</div>
    </div>`;
}

function dateBlock(date, textColor) {
  return `
    <div class="c-date-block" style="color:${textColor}">
      <div class="c-date-label">Córdoba</div>
      <div class="c-date-value">${date}</div>
    </div>`;
}

function rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

async function download() {
  const w = document.getElementById('cert-wrapper');
  const prev = w.style.transform;
  w.style.transform = 'none';
  try {
    const canvas = await html2canvas(document.getElementById('cert'), { scale:2, useCORS:true, backgroundColor:null, logging:false });
    const a = document.createElement('a');
    const n = (document.getElementById('f-name').value || 'constancia').replace(/\s+/g,'_');
    a.download = `constancia_${n}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } finally { w.style.transform = prev; }
}

function resetForm() {
  document.getElementById('f-inst').value   = 'Universidad Siglo 21';
  document.getElementById('f-unit').value   = 'Escuela de Posgrado';
  document.getElementById('f-name').value   = 'María Elena Rodríguez';
  document.getElementById('f-type').value   = 'Conversatorio';
  document.getElementById('f-course').value = 'La era del riesgo geopolítico: Impacto en los mercados y negocios internacionales';
  document.getElementById('f-hours').value  = '3 horas académicas';
  document.getElementById('f-body').value   = 'participó en calidad de asistente en el';
  document.getElementById('f-sig1').value   = 'Dr. Carlos Pérez';
  document.getElementById('f-date').value   = new Date().toISOString().split('T')[0];
  setTpl(document.querySelector('[data-tpl="institucional"]'));
  render();
}
</script>
